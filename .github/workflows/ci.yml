name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: typecheck + build + lint + e2e ─────────────────────────────────
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mwazn
          POSTGRES_PASSWORD: mwazn
          POSTGRES_DB: mwazn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mwazn"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mwazn:mwazn@localhost:5432/mwazn_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-test-access-secret-not-for-production
      JWT_REFRESH_SECRET: ci-test-refresh-secret-not-for-production
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run DB migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint -- --max-warnings 50

      - name: E2E smoke tests
        run: npm run test:e2e
        timeout-minutes: 3

  # ── Frontend: typecheck + build + lint ──────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      # Disable Next.js telemetry in CI
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  # ── Docker image smoke test ──────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t mwazn-backend:ci apps/backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:3001/api \
            -t mwazn-frontend:ci \
            apps/frontend

      - name: Start stack and run health checks
        run: |
          cp apps/backend/.env.example apps/backend/.env || true
          docker compose up -d --wait --wait-timeout 90
          sleep 5
          curl -sf http://localhost:3001/health | jq .
          curl -sf http://localhost:3001/ready  | jq .
          curl -sf http://localhost:3000       -o /dev/null -w "%{http_code}\n"
        env:
          COMPOSE_FILE: docker-compose.yml

      - name: Stop stack
        if: always()
        run: docker compose down -v
