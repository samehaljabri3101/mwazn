services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mwazn
      POSTGRES_PASSWORD: mwazn
      POSTGRES_DB: mwazn
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mwazn -d mwazn']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: postgresql://mwazn:mwazn@db:5432/mwazn
      REDIS_URL: redis://redis:6379
      PORT: '3001'
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      # ⚠️  DEV-ONLY secrets — replace with strong random values (openssl rand -hex 32) before any production deployment
      JWT_ACCESS_SECRET: mwazn_jwt_access_secret_docker_2026
      JWT_REFRESH_SECRET: mwazn_jwt_refresh_secret_docker_2026
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      SEED_ADMIN_EMAIL: admin@mwazn.sa
      SEED_ADMIN_PASSWORD: Admin@1234
      SEED_SUP_PASSWORD: Supplier@1234
      SEED_BUY_PASSWORD: Buyer@1234
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        # Baked in at build time for client-side bundle.
        # Browser → localhost:3001 (port is mapped); SSR uses API_INTERNAL_URL.
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      # Server-side (SSR) components use this to reach backend inside Docker network
      API_INTERNAL_URL: http://backend:3001/api
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  uploads_data:
